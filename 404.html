<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Page Not Found — Dr. Michael A. Weintraub</title>

    <!-- Theme init (runs before CSS parse to avoid light-mode flash) -->
    <script>
    (function() {
        try {
            const saved = localStorage.getItem('theme');
            const systemDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            document.documentElement.setAttribute('data-theme', saved || (systemDark ? 'dark' : 'light'));
        } catch (e) {}
    })();
    </script>

    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23042F33' width='100' height='100'/><text x='50' y='70' font-family='Arial' font-size='50' font-weight='bold' fill='white' text-anchor='middle'>MW</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f8fafc;
            color: #042F33;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        [data-theme="dark"] body { background: #0a1618; color: #e2f0f1; }

        .wrap {
            max-width: 560px;
            text-align: center;
        }
        .code {
            font-size: 96px;
            font-weight: 800;
            letter-spacing: -0.04em;
            color: #14B8A6;
            line-height: 1;
            margin-bottom: 14px;
        }
        h1 {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -0.02em;
            color: #042F33;
            margin-bottom: 14px;
        }
        [data-theme="dark"] h1 { color: #e2f0f1; }

        p {
            font-size: 16px;
            color: #4a5568;
            margin-bottom: 30px;
            max-width: 480px;
            margin-left: auto;
            margin-right: auto;
        }
        [data-theme="dark"] p { color: #b8c5c8; }

        .links {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
            margin-bottom: 30px;
        }
        .link-primary {
            display: inline-block;
            padding: 14px 32px;
            background: #14B8A6;
            color: #042F33;
            text-decoration: none;
            font-weight: 700;
            font-size: 15px;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .link-primary:hover { background: #2DD4BF; transform: translateY(-1px); }

        .secondary-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px 18px;
            font-size: 14px;
        }
        .secondary-links a {
            color: #0E8377;
            text-decoration: none;
            font-weight: 600;
        }
        .secondary-links a:hover { text-decoration: underline; }
        [data-theme="dark"] .secondary-links a { color: #2DD4BF; }

        .footer-note {
            margin-top: 40px;
            font-size: 13px;
            color: #718096;
        }
        [data-theme="dark"] .footer-note { color: #8a9898; }
    </style>
</head>
<body>
    <main class="wrap">
        <div class="code" aria-hidden="true">404</div>
        <h1>Page not found</h1>
        <p>The link you followed may be outdated, or the page may have moved. Here are some places to try instead:</p>

        <div class="links">
            <a href="/" class="link-primary">Return to homepage →</a>
        </div>

        <div class="secondary-links">
            <a href="/press.html">Press &amp; Media</a>
            <span aria-hidden="true">·</span>
            <a href="/publications.html">Publications</a>
            <span aria-hidden="true">·</span>
            <a href="mailto:contact@michaelweintraubmd.com">Contact</a>
        </div>

        <p class="footer-note">Dr. Michael A. Weintraub, MD — Endocrinology &amp; Obesity Medicine, New York City</p>
    </main>
</body>
</html>
